<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="description"
        content="Bản demo dự đoán vị trí bài đăng X bằng đồng xuất hiện từ khóa và KDE."
    >
    <title>{% block title %}Dự Đoán Vị Trí Bài Đăng X{% endblock %}</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap"
        rel="stylesheet"
    >
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
    <link rel="stylesheet" href="{% static 'location_app/css/style.css' %}">
</head>
<body>
    <div class="page-shell">
        {% block content %}{% endblock %}
    </div>
    <script src="{% static 'location_app/js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
